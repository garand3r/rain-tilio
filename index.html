<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CafeQueue | Art Museum Cafe</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f4e8dc;
padding:30px;
}

.container{
max-width:700px;
margin:auto;
}

.card{
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
margin-bottom:20px;
}

h1{text-align:center;}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
}

button{
padding:10px;
background:#7b4f2c;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{opacity:0.9;}

.logout-btn{
background:#444;
margin-bottom:10px;
}

.visitor{
padding:10px;
margin-top:10px;
border-radius:8px;
background:#fafafa;
border-left:5px solid #7b4f2c;
}

.timeout{
background:#ffd6d6;
border-left:5px solid red;
}

.hidden{display:none;}

#line{
border-top:1px dashed black;
margin:4px 0;
}

/* RECEIPT */

#receiptModal{
display:none;
}

.receipt{
width:54mm;
padding:2mm;
font-family:monospace;
font-size:11px;
text-align:center;
}

/* PRINT SETTINGS */

@media print {

@page{
size:58mm auto;
margin:0;
}

html,body{
width:58mm;
margin:0;
padding:0;
font-family:monospace;
font-size:11px;
}

/* hide everything */

body *{
visibility:hidden;
}

/* show receipt */

#receiptModal,
#receiptModal *{
visibility:visible;
}

/* move receipt to top */

#receiptModal{
position:absolute;
left:0;
top:0;
width:58mm;
display:block;
}

.receipt *{
page-break-inside:avoid;
}

button{
display:none;
}

}

</style>

</head>

<body>

<div class="container">

<h1>CafeQueue</h1>

<!-- LOGIN -->

<div id="loginCard" class="card">

<h3>Admin Login</h3>

<input type="password" id="adminPass" placeholder="Enter Admin Password">

<button onclick="login()">Login</button>

</div>

<!-- SYSTEM -->

<div id="systemArea" class="hidden">

<button class="logout-btn" onclick="logout()">Logout</button>

<div class="card">

<h3>Issue Visitor Pass</h3>

<input type="text" id="name" placeholder="Visitor Name">

<select id="zone">

<option>AADT Photobooth</option>
<option>Research Showcase</option>
<option>Robot Showcase</option>
<option>Art Gallery North</option>
<option>Art Gallery South</option>
<option>Booth 1</option>
<option>Booth 2</option>
<option>ABM Booth</option>
<option>Tables Left</option>
<option>Tables Right</option>

</select>

<button onclick="registerVisitor()">Register & Print Receipt</button>

</div>

<div class="card">

<h3>Admin Panel</h3>

<button onclick="exportCSV()">Export CSV Report</button>

<div id="visitors"></div>

</div>

</div>

</div>

<!-- RECEIPT -->

<div id="receiptModal">
<div class="receipt" id="receiptContent"></div>
</div>

<script src="app.js"></script>

</body>
</html>
