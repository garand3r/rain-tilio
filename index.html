<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CafeQueue | Museum Cafe</title>

<style>

body{
font-family:Arial;
background:#f4e8dc;
padding:30px;
}

.container{
max-width:700px;
margin:auto;
}

.card{
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
margin-bottom:20px;
}

h1{text-align:center;}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
}

button{
padding:10px;
background:#7b4f2c;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{opacity:0.9;}

.visitor{
padding:10px;
margin-top:10px;
border-radius:8px;
background:#fafafa;
border-left:5px solid #7b4f2c;
}

.timeout{
background:#ffd6d6;
border-left:5px solid red;
}

.delete-btn{
background:#b00020;
}

.hidden{display:none;}

/* RECEIPT */

#receiptModal{
display:none;
}

.receipt{
width:54mm;
padding:1.5mm;
font-family:monospace;
font-size:10px;   /* slightly smaller */
line-height:1.2;  /* tighter lines */

white-space:pre-wrap;
word-wrap:break-word;
overflow-wrap:break-word;
}

/* divider line tighter */
.line{
border-top:1px dashed black;
margin:2px 0;   /* reduced from 4px */
}

/* PRINT */

@media print {

@page{
size:58mm auto;
margin:0;
}

html,body{
width:58mm;
margin:0;
padding:0;
font-family:monospace;
font-size:11px;
}

body *{
visibility:hidden;
}

#receiptModal,
#receiptModal *{
visibility:visible;
}

#receiptModal{
position:absolute;
left:0;
top:0;
width:58mm;
display:block;
}

button{
display:none;
}

}

</style>

</head>

<body>

<div class="container">

<h1>CafeQueue</h1>

<!-- LOGIN -->

<div id="loginCard" class="card">
<h3>Admin Login</h3>
<input type="password" id="adminPass">
<button onclick="login()">Login</button>
</div>

<!-- SYSTEM -->

<div id="systemArea" class="hidden">

<div class="card">

<h3>Issue Visitor Pass</h3>

<input type="text" id="name" placeholder="Visitor Name">

<select id="zone1">
<option>Cafe Padua</option>
<option>Thrift and Treats</option>
<option>Museum Cafe Artspire</option>
<option>AADT - Live photobooth</option>
<option>Art Gallery</option>
<option>Research Display</option>
<option>Interactive HUB</option>
</select>

<select id="zone2">
<option>None</option>
<option>Cafe Padua</option>
<option>Thrift and Treats</option>
<option>Museum Cafe Artspire</option>
<option>AADT - Live photobooth</option>
<option>Art Gallery</option>
<option>Research Display</option>
<option>Interactive HUB</option>
</select>

<select id="zone3">
<option>None</option>
<option>Cafe Padua</option>
<option>Thrift and Treats</option>
<option>Museum Cafe Artspire</option>
<option>AADT - Live photobooth</option>
<option>Art Gallery</option>
<option>Research Display</option>
<option>Interactive HUB</option>
</select>

<button onclick="registerVisitor()">Register & Print Receipt</button>

</div>

<div class="card">
<h3>Visitors</h3>
<div id="visitors"></div>
</div>

</div>

</div>

<!-- RECEIPT -->

<div id="receiptModal">
<div class="receipt" id="receiptContent"></div>
</div>

<script src="app.js"></script>

</body>
</html>
